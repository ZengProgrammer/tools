<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tools</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
      #loader {
        width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: #0a0a0f;
      }
      #loader svg { width: 64px; height: 64px; }
      #loader .ring-bg {
        fill: none; stroke: rgba(0,168,181,0.12); stroke-width: 3;
      }
      #loader .ring-fill {
        fill: none; stroke: #00a8b5; stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 188.5;
        stroke-dashoffset: 188.5;
        animation: ring-fill 3s linear forwards, ring-pulse 1.5s ease-in-out 3s infinite;
      }
      #loader .logo-text {
        fill: #00a8b5; font-size: 20px; font-weight: 700;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        text-anchor: middle; dominant-baseline: central;
        opacity: 0; animation: logo-fade 0.6s ease-out 0.5s forwards;
      }
      @keyframes ring-fill {
        0%   { stroke-dashoffset: 188.5; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes ring-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes logo-fade {
        to { opacity: 0.9; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loader">
        <svg viewBox="0 0 64 64">
          <circle class="ring-bg" cx="32" cy="32" r="30"/>
          <circle class="ring-fill" cx="32" cy="32" r="30"/>
          <text class="logo-text" x="32" y="32">T</text>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
